# =============================================================================
# OneManCompany — Application Configuration
# =============================================================================
# Secrets (API keys) go in .env; everything else goes here.

hot_reload: true # Auto-reload config.yaml when modified (while system idle)

tools:
  sandbox:
    enabled: false # Set to true to activate sandbox module (requires Docker + opensandbox)
    server_url: "http://localhost:8080" # opensandbox-server endpoint
    default_image: "opensandbox/code-interpreter:v1.0.1"
    timeout_seconds: 120 # max execution time per call

talent_market:
  url: "https://api.carbonkites.com/mcp/sse" # Centralized Talent Market endpoint
  api_key: "" # Set your API key in Settings or here
