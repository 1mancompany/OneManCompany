<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>OMC Pet System — Full Preview</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a1a;color:#ccc;font-family:'Courier New',monospace;display:flex;height:100vh;overflow:hidden}

  /* Layout: roster | office | panel */
  .roster{width:140px;background:#12121e;border-right:1px solid #333;padding:8px;overflow-y:auto}
  .roster h3{font-size:10px;color:#666;margin-bottom:8px;letter-spacing:1px}
  .roster-item{font-size:10px;color:#aaa;padding:4px 6px;margin-bottom:3px;background:#1a1a2e;border-radius:3px;border-left:3px solid #5599ff}

  .office-area{flex:1;position:relative;display:flex;flex-direction:column;background:#0a0a1a}
  .office-bar{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;background:#12121e;border-bottom:1px solid #333}
  .office-bar .title{font-size:11px;color:#44ddaa;letter-spacing:1px}
  .office-bar .stats{font-size:10px;color:#888;display:flex;gap:10px}
  .office-bar button{background:#1a1a2e;border:1px solid #444;color:#ccc;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit}
  .office-bar button:hover{border-color:#44ddaa;color:#44ddaa}
  .office-bar button.active{border-color:#44ddaa;color:#44ddaa;background:#1a2a2e}
  canvas{flex:1;image-rendering:pixelated;image-rendering:crisp-edges}

  /* Pet Panel (right side) */
  .pet-panel{width:280px;background:#12121e;border-left:1px solid #333;display:none;flex-direction:column}
  .pet-panel.open{display:flex}
  .pet-panel-header{display:flex;border-bottom:1px solid #333}
  .pet-tab{flex:1;background:none;border:none;color:#888;padding:8px 4px;font-size:10px;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit}
  .pet-tab:hover{color:#ccc}
  .pet-tab.active{color:#44ddaa;border-bottom-color:#44ddaa}
  .pet-panel-body{flex:1;overflow-y:auto;padding:8px}
  .pet-tab-content{display:none}
  .pet-tab-content.active{display:block}

  /* Pet card */
  .pet-card{background:#1a1a2e;border:1px solid #333;border-radius:6px;padding:8px;margin-bottom:6px}
  .pet-card .name{color:#eee;font-size:11px;font-weight:bold}
  .pet-card .species{color:#888;font-size:9px}
  .pet-card .stray{color:#ffaa00;font-size:9px}
  .pet-card .speech{font-size:9px;color:#ddd;background:#2a2a4e;padding:2px 6px;border-radius:3px;margin:4px 0;font-style:italic}
  .pet-card .translate{font-size:8px;color:#44ddaa;cursor:pointer;text-decoration:underline;background:none;border:none;font-family:inherit}
  .need-row{display:flex;align-items:center;gap:4px;margin:2px 0;font-size:9px;color:#999}
  .need-label{width:55px}
  .need-bg{flex:1;height:4px;background:#222;border-radius:2px;overflow:hidden}
  .need-fill{height:100%;border-radius:2px;transition:width 0.5s}
  .pet-actions{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap}
  .pet-actions button{background:#2a2a4e;color:#aaa;border:1px solid #444;padding:2px 6px;font-size:9px;cursor:pointer;border-radius:3px;font-family:inherit}
  .pet-actions button:hover{color:#44ddaa;border-color:#44ddaa}
  .pet-actions button.danger{color:#ff6666;border-color:#ff6666}
  .pet-actions button.danger:hover{color:#ff4444;border-color:#ff4444}
  .sad-warning{color:#ff6666;font-size:9px;margin-top:3px}

  /* Token bar */
  .token-bar{background:#1a1a2e;border:1px solid #333;border-radius:4px;padding:6px 10px;margin-bottom:8px;font-size:11px;display:flex;justify-content:space-between}
  .token-bar .bal{color:#ffdd44}

  /* Shop item */
  .shop-item{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #1a1a2e}
  .shop-item .icon{font-size:16px;width:24px;text-align:center}
  .shop-item .info{flex:1;font-size:10px}
  .shop-item .info .name{color:#ddd}
  .shop-item .info .desc{color:#555;font-size:8px}
  .shop-item .cost{color:#ffdd44;font-size:10px;margin-right:4px}
  .shop-item button{background:#2a2a4e;color:#44ddaa;border:1px solid #44ddaa;padding:2px 6px;font-size:9px;cursor:pointer;border-radius:3px;font-family:inherit}

  .section-label{font-size:9px;color:#666;margin:8px 0 4px;text-transform:uppercase;letter-spacing:1px}
  .empty-msg{color:#555;font-size:10px;text-align:center;padding:16px}

  /* Toast */
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a2a2e;border:1px solid #44ddaa;color:#ccc;padding:8px 16px;border-radius:6px;font-size:11px;display:none;z-index:999;max-width:300px;text-align:center}
</style>
</head>
<body>

<!-- Left: Roster -->
<div class="roster">
  <h3>EMPLOYEES</h3>
  <div class="roster-item" style="border-color:#ffd700">👑 CEO</div>
  <div class="roster-item" style="border-color:#5599ff">Sam HR</div>
  <div class="roster-item" style="border-color:#ff9944">Alex COO</div>
  <div class="roster-item" style="border-color:#44ddaa">Pat EA</div>
  <div class="roster-item" style="border-color:#bb55ff">Morgan CSO</div>
</div>

<!-- Center: Office -->
<div class="office-area">
  <div class="office-bar">
    <span class="title">▸ ONE MAN COMPANY</span>
    <div class="stats">
      <span>👥 5</span>
      <span>🔧 3</span>
      <span>🏢 2/3</span>
    </div>
    <button id="pet-btn" onclick="togglePanel()">🐾 Pets</button>
  </div>
  <canvas id="office"></canvas>
</div>

<!-- Right: Pet Panel -->
<div class="pet-panel" id="pet-panel">
  <div class="pet-panel-header">
    <button class="pet-tab active" onclick="switchTab('pets')">🐾 Pets</button>
    <button class="pet-tab" onclick="switchTab('shop')">🛒 Shop</button>
    <button class="pet-tab" onclick="switchTab('facilities')">🏠 Place</button>
  </div>
  <div class="pet-panel-body">
    <div id="tab-pets" class="pet-tab-content active"></div>
    <div id="tab-shop" class="pet-tab-content"></div>
    <div id="tab-facilities" class="pet-tab-content"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Canvas Setup ──
const C = document.getElementById('office');
const ctx = C.getContext('2d');
ctx.imageSmoothingEnabled = false;
const T = 32;
let frame = 0;

function resizeCanvas() {
  const area = C.parentElement;
  C.width = area.clientWidth;
  C.height = area.clientHeight - 28; // minus bar
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const COLS = () => Math.floor(C.width/T);
const ROWS = () => Math.floor(C.height/T);
const WALL_ROWS = 2;

// ── Sprites ──
const sheets = {};
const BASE = 'sprites/street-animals';
const SPECIES_LIST = [
  {id:'dog',dir:'1 Dog',size:48,name:'Dog'},
  {id:'dog2',dir:'2 Dog 2',size:48,name:'Dog'},
  {id:'cat',dir:'3 Cat',size:48,name:'Cat'},
  {id:'cat2',dir:'4 Cat 2',size:48,name:'Cat'},
  {id:'rat',dir:'5 Rat',size:32,name:'Rat'},
  {id:'rat2',dir:'6 Rat 2',size:32,name:'Rat'},
  {id:'bird',dir:'7 Bird',size:32,name:'Bird'},
  {id:'bird2',dir:'8 Bird 2',size:32,name:'Bird'},
];
const SP_MAP = {};
SPECIES_LIST.forEach(s => SP_MAP[s.id] = s);

function loadSheet(dir,file) {
  const k=`${dir}/${file}`;
  if(sheets[k])return sheets[k];
  const img=new Image();img.src=`${BASE}/${dir}/${file}`;
  img.onload=()=>{sheets[k]=img};return null;
}
for(const sp of SPECIES_LIST){loadSheet(sp.dir,'Idle.png');loadSheet(sp.dir,'Walk.png');if(sp.size===48)loadSheet(sp.dir,'Attack.png')}

// ── Simlish ──
const SIMLISH={
  hungry:['Mew naka~','Fud nom!','Grr tum...'],
  happy:['Purr yip~','Woo nyan!','Hehe boop♪'],
  tired:['Zzz muu...','Yawn nuu~','Muuu bleh...'],
  playful:['Zoom paw!','Bap wee~','Nya hop!'],
  content:['Purr mmm~','Ahh zen♪','Chu bliss~'],
};
const TRANSLATIONS={
  hungry:["I'm getting hungry...","Is it snack time yet?","My tummy is rumbling!"],
  happy:["Life is great!","I love this office!","Best day ever!"],
  tired:["So sleepy...","I need a nap.","Where's my bed?"],
  playful:["Let's play!","Chase me!","Where's my toy?"],
  content:["Everything is perfect.","I'm so cozy.","This is the life."],
};

// ── Pet State ──
let tokens = 5;
let pets = [];
let facilities = [{id:'fb1',type:'food_bowl',x:5,y:9},{id:'pb1',type:'pet_bed',x:10,y:9}];

function randSpecies(){return SPECIES_LIST[Math.floor(Math.random()*SPECIES_LIST.length)]}
function randMood(){return['hungry','happy','tired','playful','content'][Math.floor(Math.random()*5)]}

function spawnPets() {
  pets = [];
  for(let i=0;i<3;i++){
    const sp=randSpecies();
    const mood=randMood();
    pets.push({
      id:`pet_${i}`,species:sp.id,sp,
      name:['Rex','Mochi','Whiskers','Pip','Nibbles','Shadow','Sunny','Luna'][Math.floor(Math.random()*8)],
      owner:i<2?'00001':null, // first 2 owned, last is stray
      state:'idle',
      x:3+Math.random()*12, y:3+Math.random()*5,
      targetX:0,targetY:0,
      needs:{hunger:0.3+Math.random()*0.7,happiness:0.3+Math.random()*0.7,energy:0.3+Math.random()*0.7},
      speech:Math.random()>0.5?SIMLISH[mood][Math.floor(Math.random()*3)]:null,
      mood,sad_ticks:0,
      animFrame:Math.random()*100,
      idleTimer:0,
    });
  }
  refreshPanel();
}
spawnPets();

// ── Lazy Pet Behavior ──
function updatePets() {
  for(const p of pets){
    if(p.state==='walking'){
      // Very slow movement
      const dx=p.targetX-p.x, dy=p.targetY-p.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<0.3){
        p.state='idle'; p.idleTimer=0;
      } else {
        const speed=0.015; // very slow
        p.x+=dx*speed; p.y+=dy*speed;
      }
    } else {
      p.idleTimer++;
      // Very lazy: only move every ~500 frames (~8 seconds)
      if(p.idleTimer > 400+Math.random()*300){
        // 40% chance to actually walk, 60% just reset timer
        if(Math.random()<0.4){
          p.state='walking';
          p.targetX=p.x+(Math.random()-0.5)*4; // short distance
          p.targetY=p.y+(Math.random()-0.5)*2;
          p.targetX=Math.max(1,Math.min(COLS()-2,p.targetX));
          p.targetY=Math.max(WALL_ROWS+1,Math.min(ROWS()-3,p.targetY));
        }
        p.idleTimer=0;
      }
    }
    // Speech toggle (very rare)
    if(frame%600===Math.floor(Math.random()*600)){
      const mood=randMood();
      p.speech=Math.random()>0.5?SIMLISH[mood][Math.floor(Math.random()*3)]:null;
      p.mood=mood;
    }
  }
}

// ── Drawing ──
function drawFloor(){
  const cols=COLS(),rows=ROWS();
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    ctx.fillStyle=r<WALL_ROWS?(r===0?'#161428':'#1e1a34'):((r+c)%2===0?'#2a2a3e':'#282840');
    ctx.fillRect(c*T,r*T,T,T);
  }
  ctx.fillStyle='#333355';ctx.fillRect(0,WALL_ROWS*T-2,C.width,2);
  // Windows
  for(let w=0;w<4;w++){
    const wx=(2+w*5)*T;
    ctx.fillStyle='#112244';ctx.fillRect(wx,4,T*2,T-8);
    ctx.fillStyle=`rgba(40,60,120,${0.4+Math.sin(frame*0.008+w)*0.12})`;
    ctx.fillRect(wx+2,6,T*2-4,T-12);
  }
}

function drawDesks(){
  const positions=[[1,WALL_ROWS+1],[5,WALL_ROWS+1],[9,WALL_ROWS+1],[13,WALL_ROWS+1]];
  const colors=['#ffd700','#5599ff','#ff9944','#44ddaa'];
  for(let i=0;i<positions.length;i++){
    const[dx,dy]=positions[i];
    ctx.fillStyle='#554433';
    ctx.fillRect(dx*T,dy*T+8,T*2,T-8);ctx.fillRect(dx*T,(dy+1)*T,T,T-4);
    ctx.fillStyle='#222';ctx.fillRect((dx+1)*T+6,dy*T+2,T-12,T-6);
    ctx.fillStyle=`rgba(34,221,255,${0.4+Math.sin(frame*0.015+i)*0.1})`;
    ctx.fillRect((dx+1)*T+8,dy*T+4,T-16,T-10);
    // Character
    const cx=(dx+1)*T+T/2,cy=dy*T;
    ctx.fillStyle=colors[i];ctx.fillRect(cx-6,cy+8,12,14);
    ctx.fillStyle='#ffddbb';ctx.fillRect(cx-5,cy,10,10);
    ctx.fillStyle='#333';ctx.fillRect(cx-3,cy+3,2,2);ctx.fillRect(cx+1,cy+3,2,2);
    if(i===0){ctx.fillStyle='#ffd700';ctx.fillRect(cx-4,cy-4,8,3);ctx.fillRect(cx-1,cy-5,2,2)}
  }
}

function drawFacilities(){
  const icons={food_bowl:'🍖',pet_bed:'🛏',toy_ball:'⚾'};
  for(const f of facilities){
    const px=f.x*T,py=f.y*T;
    ctx.fillStyle='rgba(50,50,70,0.4)';ctx.fillRect(px+2,py+2,T-4,T-4);
    ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(icons[f.type]||'?',px+T/2,py+T/2);
  }
}

function drawPet(pet){
  const sp=pet.sp;
  const px=pet.x*T, py=pet.y*T;

  let animFile='Idle.png',frameCount=4;
  if(pet.state==='walking'){animFile='Walk.png';frameCount=sp.size===48?6:4}

  const sheet=sheets[`${sp.dir}/${animFile}`];
  const drawSize=sp.size===48?T*1.2:T*0.9;

  if(sheet){
    pet.animFrame+=(pet.state==='walking'?0.12:0.06); // slower animation
    const f=Math.floor(pet.animFrame)%frameCount;
    const dx=px+T/2-drawSize/2, dy=py+T/2-drawSize/2;

    ctx.save();
    if(pet.state==='walking'&&pet.targetX<pet.x){
      ctx.translate(dx+drawSize,0);ctx.scale(-1,1);
      ctx.drawImage(sheet,f*sp.size,0,sp.size,sp.size,0,dy,drawSize,drawSize);
    }else{
      ctx.drawImage(sheet,f*sp.size,0,sp.size,sp.size,dx,dy,drawSize,drawSize);
    }
    ctx.restore();
  }else{
    ctx.fillStyle='#aaddff';ctx.beginPath();ctx.arc(px+T/2,py+T/2,T*0.35,0,Math.PI*2);ctx.fill();
  }

  // Speech bubble
  if(pet.speech){
    const bx=px+T/2, by=py+T/2-drawSize/2-14;
    ctx.font='7px monospace';
    const tw=ctx.measureText(pet.speech).width;
    const bw=tw+8,bh=12;
    // Fade
    const alpha=0.7+Math.sin(frame*0.03)*0.15;
    ctx.fillStyle=`rgba(255,255,255,${alpha})`;
    ctx.beginPath();ctx.roundRect(bx-bw/2,by-bh,bw,bh,3);ctx.fill();
    ctx.beginPath();ctx.moveTo(bx-3,by);ctx.lineTo(bx+3,by);ctx.lineTo(bx,by+4);ctx.fill();
    ctx.fillStyle='#333';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(pet.speech,bx,by-bh/2);
  }

  // Name tag
  ctx.font='7px monospace';ctx.textAlign='center';
  const tag=pet.name+(pet.owner?'':' ★');
  const ntw=ctx.measureText(tag).width;
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(px+T/2-ntw/2-2,py+T/2+drawSize/2,ntw+4,9);
  ctx.fillStyle=pet.owner?'#88ddaa':'#ffcc66';
  ctx.fillText(tag,px+T/2,py+T/2+drawSize/2+7);
}

// ── Panel ──
function togglePanel(){
  const p=document.getElementById('pet-panel');
  const btn=document.getElementById('pet-btn');
  p.classList.toggle('open');
  btn.classList.toggle('active');
  if(p.classList.contains('open')) refreshPanel();
  resizeCanvas();
}

function switchTab(name){
  document.querySelectorAll('.pet-tab').forEach(t=>t.classList.toggle('active',t.textContent.toLowerCase().includes(name)));
  document.querySelectorAll('.pet-tab-content').forEach(c=>c.classList.toggle('active',c.id===`tab-${name}`));
}

function refreshPanel(){
  renderPetsTab();
  renderShopTab();
  renderFacilitiesTab();
}

function renderPetsTab(){
  const el=document.getElementById('tab-pets');
  let html='';
  for(const pet of pets){
    const isStray=!pet.owner;
    const needsHtml=Object.entries(pet.needs).map(([k,v])=>{
      const pct=Math.round(v*100);
      const color=k==='hunger'?'#ff9944':k==='happiness'?'#ff66aa':'#44aaff';
      return`<div class="need-row"><span class="need-label">${k}</span><div class="need-bg"><div class="need-fill" style="width:${pct}%;background:${color}"></div></div><span>${pct}%</span></div>`;
    }).join('');

    const speechHtml=pet.speech?`<div class="speech">"${pet.speech}" <button class="translate" onclick="translatePet('${pet.id}')">translate</button></div>`:'';
    const sadHtml=pet.sad_ticks>100?'<div class="sad-warning">⚠ Unhappy — may leave!</div>':'';

    const actions=isStray
      ?'<button onclick="adoptPet(\''+pet.id+'\')">Adopt</button>'
      :'<button onclick="petAction(\''+pet.id+'\',\'pet\')">Pet</button><button onclick="petAction(\''+pet.id+'\',\'feed\')">Feed</button><button onclick="renamePet(\''+pet.id+'\')">Rename</button><button class="danger" onclick="releasePet(\''+pet.id+'\')">Release</button>';

    html+=`<div class="pet-card">
      <div class="name">${pet.name||'???'} ${isStray?'<span class="stray">[Stray]</span>':''}</div>
      <div class="species">${pet.sp.name} · ${pet.state}</div>
      ${needsHtml}${sadHtml}${speechHtml}
      <div class="pet-actions">${actions}</div>
    </div>`;
  }
  if(!pets.length) html='<div class="empty-msg">No pets yet...<br>They will appear on their own</div>';
  el.innerHTML=html;
}

function renderShopTab(){
  const el=document.getElementById('tab-shop');
  const items=[
    {id:'premium_treat',icon:'🍖',name:'Premium Treat',desc:'hunger +40%',cost:1},
    {id:'fish_snack',icon:'🐟',name:'Fish Snack',desc:'hunger +30%, happy +10%',cost:1},
    {id:'catnip_toy',icon:'🧸',name:'Catnip Toy',desc:'happy +50% (cats)',cost:1},
    {id:'chew_bone',icon:'🦴',name:'Chew Bone',desc:'happy +40% (dogs)',cost:1},
    {id:'energy_drink',icon:'☕',name:'Energy Drink',desc:'energy +50%',cost:2},
    {id:'fetch_ball',icon:'🎾',name:'Fetch Ball',desc:'happy +30%, energy -10%',cost:1},
    {id:'birthday_cake',icon:'🍰',name:'Birthday Cake',desc:'all needs +30%',cost:3},
  ];

  let html=`<div class="token-bar"><span>🪙 Pet Tokens</span><span class="bal">${tokens}</span></div>`;
  html+='<div class="section-label">Consumables</div>';
  for(const item of items){
    html+=`<div class="shop-item"><span class="icon">${item.icon}</span><div class="info"><div class="name">${item.name}</div><div class="desc">${item.desc}</div></div><span class="cost">🪙${item.cost}</span><button onclick="buyItem('${item.id}',${item.cost})">Use</button></div>`;
  }
  el.innerHTML=html;
}

function renderFacilitiesTab(){
  const el=document.getElementById('tab-facilities');
  const icons={food_bowl:'🍖',pet_bed:'🛏',toy_ball:'⚾'};

  let html='<div class="section-label">Placed</div>';
  if(!facilities.length) html+='<div class="empty-msg">No facilities</div>';
  for(const f of facilities){
    html+=`<div class="shop-item"><span class="icon">${icons[f.type]||'?'}</span><div class="info"><div class="name">${f.type.replace(/_/g,' ')}</div></div><button onclick="removeFac('${f.id}')" style="color:#ff6666;border-color:#ff6666">Remove</button></div>`;
  }
  html+=`<div class="section-label">Place New</div>`;
  for(const[type,icon,cost]of[['food_bowl','🍖',1],['pet_bed','🛏',2],['toy_ball','⚾',1]]){
    html+=`<div class="shop-item"><span class="icon">${icon}</span><div class="info"><div class="name">${type.replace(/_/g,' ')}</div></div><span class="cost">🪙${cost}</span><button onclick="placeFac('${type}',${cost})">Place</button></div>`;
  }
  el.innerHTML=html;
}

// ── Actions ──
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',3000)}

function adoptPet(id){
  const p=pets.find(p=>p.id===id);if(!p)return;
  const owned=pets.filter(p=>p.owner);
  if(owned.length>=3){showToast('Max 3 owned pets! Release one first.');return}
  p.owner='00001';showToast(`Adopted ${p.name}!`);refreshPanel();
}
function releasePet(id){
  const i=pets.findIndex(p=>p.id===id);if(i<0)return;
  showToast(`${pets[i].name} has been released.`);pets.splice(i,1);refreshPanel();
}
function petAction(id,action){
  const p=pets.find(p=>p.id===id);if(!p)return;
  if(action==='pet')p.needs.happiness=Math.min(1,p.needs.happiness+0.15);
  if(action==='feed')p.needs.hunger=Math.min(1,p.needs.hunger+0.2);
  showToast(`${action==='pet'?'Petted':'Fed'} ${p.name}!`);refreshPanel();
}
function renamePet(id){
  const p=pets.find(p=>p.id===id);if(!p)return;
  const name=prompt('Name your pet:',p.name);if(!name)return;
  p.name=name;refreshPanel();
}
function translatePet(id){
  const p=pets.find(p=>p.id===id);if(!p||!p.mood)return;
  const t=TRANSLATIONS[p.mood];
  showToast(`EA: "${t[Math.floor(Math.random()*t.length)]}"`);
}
function buyItem(itemId,cost){
  if(tokens<cost){showToast('Not enough tokens!');return}
  const owned=pets.filter(p=>p.owner);
  if(!owned.length){showToast('No adopted pets!');return}
  tokens-=cost;
  showToast(`Used ${itemId.replace(/_/g,' ')} on ${owned[0].name}!`);refreshPanel();
}
function placeFac(type,cost){
  if(tokens<cost){showToast('Not enough tokens!');return}
  tokens-=cost;
  facilities.push({id:`f_${Date.now()}`,type,x:Math.floor(3+Math.random()*12),y:Math.floor(8+Math.random()*2)});
  showToast(`Placed ${type.replace(/_/g,' ')}!`);refreshPanel();
}
function removeFac(id){
  facilities=facilities.filter(f=>f.id!==id);
  showToast('Facility removed');refreshPanel();
}

// ── Render Loop ──
function render(){
  frame++;
  ctx.clearRect(0,0,C.width,C.height);
  drawFloor();
  drawDesks();
  drawFacilities();
  updatePets();
  // Sort by Y for depth
  const sorted=[...pets].sort((a,b)=>a.y-b.y);
  for(const p of sorted) drawPet(p);
  // Scanlines
  ctx.fillStyle='rgba(0,0,0,0.02)';
  for(let y=0;y<C.height;y+=2)ctx.fillRect(0,y,C.width,1);
  requestAnimationFrame(render);
}
render();

// ── Hover tooltip ──
C.addEventListener('mousemove',e=>{
  const rect=C.getBoundingClientRect();
  const sx=e.clientX-rect.left,sy=e.clientY-rect.top;
  for(const p of pets){
    if(Math.abs(sx-p.x*T-T/2)<T&&Math.abs(sy-p.y*T-T/2)<T){
      C.title=`${p.name} (${p.sp.name}) — ${p.state}${p.owner?'':' [Stray]'}`;
      C.style.cursor='pointer';return;
    }
  }
  C.title='';C.style.cursor='default';
});
C.addEventListener('click',()=>{
  if(!document.getElementById('pet-panel').classList.contains('open'))togglePanel();
});
</script>
</body>
