const DOG = [
//01234567890123456789012345678901
 '00000001111111110000000000000000', // 0  round dome
 '00000122222222221000000000000000', // 1

 '00012222222222222210000000000000', // 3  head round

 '03122222222222222221300000000000', // 5  ears start
 '331222A59222295A22221330000000B0', // 6  eyes + ears hang
 '33122225922229522222133000000000', // 7
 '33122222222222222222133000000000', // 8  ears
 '33122224444444442221330000000000', // 9  muzzle (lighter)
 '33012224444664442210330000000000', // 10 big nose
 '33001224444664442100330000000000', // 11

 '00000012222222222100000000000000', // 13 jaw

// ── DOG POINTY EARS variant ──
const DOG_POINTY = [

 '00012100000000000001210000000000', // 0  pointy ears up

// ── HAMSTER: absolute unit of roundness ──
const HAM = [
//01234567890123456789012345678901
 '00000000000000000000000000000000', // 0

 '00000122100000012210000000000000', // 3

// ═══════════════════════════════════════════════════════════════
const COLORS = {
  '1': [25,22,30,255],
  '2': [210,210,215,255],
  '3': [160,160,165,255],
  '4': [235,235,238,255],
  '5': [200,200,205,255],
  '9': [20,20,22,255],
  'A': [255,255,255,255],
  '6': [180,130,130,255],
  '7': [200,160,158,255],
  '8': [160,160,165,128],
  'B': [140,120,118,255],
  'C': [220,110,110,255],
  'D': [180,180,185,255],
  'E': [220,200,60,255],
  'F': [210,195,188,255],
};

function composeFull(tmpl, bodyColor, eyeColor, collarColor) {
  const cv = document.createElement('canvas');
  cv.width=S;cv.height=S;
  const ctx=cv.getContext('2d');
  ctx.imageSmoothingEnabled=false;

  // Body tint (2,3,4)
  const bc=document.createElement('canvas');bc.width=S;bc.height=S;
  const bx=bc.getContext('2d');bx.imageSmoothingEnabled=false;
  for(let y=0;y<S;y++){const r=tmpl[y]||'';for(let x=0;x<S;x++){
    const ch=r[x];if(ch==='2'||ch==='3'||ch==='4'){
      const c=COLORS[ch];bx.fillStyle=`rgba(${c[0]},${c[1]},${c[2]},1)`;bx.fillRect(x,y,1,1);
    }
  }}
  bx.globalCompositeOperation='multiply';
  bx.fillStyle=`rgb(${bodyColor[0]},${bodyColor[1]},${bodyColor[2]})`;
  bx.fillRect(0,0,S,S);
  bx.globalCompositeOperation='destination-in';
  for(let y=0;y<S;y++){const r=tmpl[y]||'';for(let x=0;x<S;x++){
    const ch=r[x];if(ch==='2'||ch==='3'||ch==='4'){bx.fillStyle='rgba(255,255,255,1)';bx.fillRect(x,y,1,1);}
  }}
  ctx.drawImage(bc,0,0);

  // Cheeks (F) — slightly tinted with body color but pinker
  for(let y=0;y<S;y++){const r=tmpl[y]||'';for(let x=0;x<S;x++){
    if(r[x]==='F'){
      const cr=Math.min(255,Math.round(bodyColor[0]*0.85+40));
      const cg=Math.min(255,Math.round(bodyColor[1]*0.75+30));
      const cb=Math.min(255,Math.round(bodyColor[2]*0.7+25));
      ctx.fillStyle=`rgb(${cr},${cg},${cb})`;ctx.fillRect(x,y,1,1);
    }
  }}

  // Eyes tinted
  for(let y=0;y<S;y++){const r=tmpl[y]||'';for(let x=0;x<S;x++){
    if(r[x]==='5'){
      const f=COLORS['5'][0]/255;
      ctx.fillStyle=`rgb(${Math.round(eyeColor[0]*f)},${Math.round(eyeColor[1]*f)},${Math.round(eyeColor[2]*f)})`;
      ctx.fillRect(x,y,1,1);
    }
  }}

  // Collar tinted (D)
  for(let y=0;y<S;y++){const r=tmpl[y]||'';for(let x=0;x<S;x++){
    if(r[x]==='D'&&collarColor){
      ctx.fillStyle=`rgb(${collarColor[0]},${collarColor[1]},${collarColor[2]})`;
      ctx.fillRect(x,y,1,1);
    }
  }}

  // Everything else (outline, nose, pupils, shine, whiskers, inner ear, mouth, tongue, tag)
  for(let y=0;y<S;y++){const r=tmpl[y]||'';for(let x=0;x<S;x++){
    const ch=r[x];
    if(ch==='0'||ch==='2'||ch==='3'||ch==='4'||ch==='5'||ch==='F'||ch==='D') continue;
    const c=COLORS[ch];if(!c)continue;
    ctx.fillStyle=`rgba(${c[0]},${c[1]},${c[2]},${c[3]/255})`;ctx.fillRect(x,y,1,1);
  }}

  return cv;
}

// ═══════════════════════════════════════════════════════════════

function renderRow(id, tmpl, colors, hasCollar) {
  const el=document.getElementById(id);
  for(const c of colors){
    const card=document.createElement('div');card.className='card';
    const cv=composeFull(tmpl,c.body,c.eyes,hasCollar?c.collar:null);
    cv.style.width=S*Z+'px';cv.style.height=S*Z+'px';
    card.appendChild(cv);
    const lbl=document.createElement('div');lbl.className='label';lbl.textContent=c.name;
    card.appendChild(lbl);el.appendChild(card);
  }
}

renderRow('cats', CAT, CAT_COLORS, false);
renderRow('dogs', DOG, DOG_COLORS, true);
renderRow('hams', HAM, HAM_COLORS, false);

sec.innerHTML='<div class="stitle">🐕 Dog — pointy ear variant</div>';

sec.appendChild(row);document.getElementById('hams').parentElement.before(sec);

</script>
