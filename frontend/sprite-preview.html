<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pet Sprite Preview</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a1a;color:#ccc;font-family:'Courier New',monospace;padding:24px}
  h1{color:#44ddaa;font-size:15px;letter-spacing:2px;margin-bottom:4px}
  .sub{color:#666;font-size:11px;margin-bottom:20px}
  .section{margin-bottom:28px}
  .stitle{color:#aaa;font-size:13px;margin-bottom:10px;border-bottom:1px solid #222;padding-bottom:4px}
  .grid{display:flex;flex-wrap:wrap;gap:14px}
  .item{background:#1a1a2e;border:1px solid #333;border-radius:6px;padding:10px;text-align:center;width:160px}
  .item canvas{image-rendering:pixelated;image-rendering:crisp-edges;margin-bottom:4px;background:#2a2a3e;border-radius:4px}
  .lbl{font-size:10px;color:#aaa;font-weight:bold}
  .traits{font-size:8px;color:#666;margin-top:3px;line-height:1.4}
  .ctrl{margin-bottom:18px;display:flex;gap:12px;align-items:center}
  button{background:#2a2a4e;color:#44ddaa;border:1px solid #44ddaa;padding:6px 16px;font-family:inherit;font-size:12px;cursor:pointer;border-radius:4px}
  button:hover{background:#3a3a5e}
  .poses-row{display:flex;gap:3px;margin-top:8px;justify-content:center;flex-wrap:wrap}
  .pose-wrap{text-align:center}
  .pose-wrap canvas{width:32px;height:32px;background:#222;border-radius:2px;display:block}
  .pose-label{font-size:7px;color:#555}
  #status{font-size:11px;color:#888;margin-bottom:12px}
</style>
</head>
<body>
<h1>▸ PET SPRITE LAYER COMPOSITION PREVIEW</h1>
<p class="sub">Real PNGs · layer stacking · multiply tint · 3x zoom</p>
<div class="ctrl">
  <button onclick="regen()">🎲 Regenerate</button>
  <button onclick="showAllPosesFlag=!showAllPosesFlag;regen()">Toggle Poses</button>
</div>
<div id="status">Loading...</div>
<div id="g"></div>
<script>
const S=32,Z=3;

const palettes={
  cat:{body:{orange:[235,165,65],black:[58,55,62],white:[244,242,238],gray:[150,150,160],siamese:[218,202,180],cream:[248,234,200],ginger:[220,148,60],chocolate:[130,80,42]},eyes:{green:[70,205,92],blue:[82,172,232],gold:[228,192,52],copper:[200,140,60],aqua:[78,192,212],yellow:[185,225,52]}},
  dog:{body:{golden:[220,180,90],brown:[160,110,65],black:[60,58,55],white:[242,240,234],husky:[180,184,194],corgi:[230,180,94],chocolate:[130,80,42],red:[195,110,55]},eyes:{brown:[58,42,22],amber:[180,130,50],blue:[62,88,132],hazel:[120,100,55],green:[70,120,60],dark:[40,30,18]},collar:{red:[222,62,58],blue:[58,122,222],green:[58,178,82],gold:[222,182,52],purple:[182,82,202]}},
  hamster:{body:{golden:[230,190,110],white:[246,244,242],gray:[170,170,178],cinnamon:[200,140,78],cream:[248,234,200],panda:[242,242,242]},eyes:{black:[24,24,26],ruby:[140,40,40],brown:[80,50,30],blue:[60,80,130],pink:[160,80,100],dark:[40,30,25]}}
};
const parts={
  cat:{body_colors:["orange","black","white","gray","siamese","cream","ginger","chocolate"],patterns:["solid","tabby","spotted","bicolor","calico","pointed"],ears:["pointy","round","fold"],tails:["long","curled","fluffy"],eye_colors:["green","blue","gold","copper","aqua","yellow"]},
  dog:{body_colors:["golden","brown","black","white","husky","corgi","chocolate","red"],patterns:["solid","spotted","masked","saddle","merle"],ears:["floppy","pointy","half"],tails:["up","down","curled"],eye_colors:["brown","amber","blue","hazel","green","dark"],collar_colors:["red","blue","green","gold","purple"]},
  hamster:{body_colors:["golden","white","gray","cinnamon","cream","panda"],patterns:["solid","striped","panda","patched"],cheeks:["normal","stuffed"],ears:["round","pointed"],eye_colors:["black","ruby","brown","blue","pink","dark"]}
};
const allPoses=["sit","walk_a","walk_b","sleep","eat","play"];

function rngF(seed){let s=seed;return()=>{s=(s+0x6D2B79F5)|0;let t=Math.imul(s^(s>>>15),1|s);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296}}
function hs(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return h}
function genApp(pid,sp){const p=parts[sp];if(!p)return{};const r=rngF(hs(pid));const pk=a=>a[Math.floor(r()*a.length)];const a={};if(p.body_colors)a.body_color=pk(p.body_colors);if(p.patterns)a.pattern=pk(p.patterns);if(p.ears)a.ears=pk(p.ears);if(p.tails)a.tail=pk(p.tails);if(p.cheeks)a.cheeks=pk(p.cheeks);if(p.eye_colors)a.eye_color=pk(p.eye_colors);if(p.collar_colors)a.collar_color=pk(p.collar_colors);return a}

const ic={};
function li(p){if(ic[p]!==undefined)return Promise.resolve(ic[p]);return new Promise(r=>{const i=new Image();i.onload=()=>{ic[p]=i;r(i)};i.onerror=()=>{ic[p]=null;r(null)};i.src=p})}

function tint(ctx,img,r,g,b){
  const t=document.createElement('canvas');t.width=S;t.height=S;
  const c=t.getContext('2d');c.imageSmoothingEnabled=false;
  c.drawImage(img,0,0);c.globalCompositeOperation='multiply';
  c.fillStyle=`rgb(${r},${g},${b})`;c.fillRect(0,0,S,S);
  c.globalCompositeOperation='destination-in';c.drawImage(img,0,0);
  ctx.drawImage(t,0,0);
}

async function compose(sp,app,pose){
  const cv=document.createElement('canvas');cv.width=S;cv.height=S;
  const ctx=cv.getContext('2d');ctx.imageSmoothingEnabled=false;
  const bp=`sprites/pets/${sp}/${pose}`;
  const pal=palettes[sp];

  const body=await li(`${bp}/body.png`);
  if(body){tint(ctx,body,...(pal?.body?.[app.body_color]||[200,200,200]))}
  if(app.pattern&&app.pattern!=='solid'){const p=await li(`${bp}/pattern_${app.pattern}.png`);if(p)ctx.drawImage(p,0,0)}
  if(app.ears){const e=await li(`${bp}/ears_${app.ears}.png`);if(e)ctx.drawImage(e,0,0)}
  if(app.tail){const t=await li(`${bp}/tail_${app.tail}.png`);if(t)ctx.drawImage(t,0,0)}
  if(app.cheeks){const c=await li(`${bp}/cheeks_${app.cheeks}.png`);if(c)ctx.drawImage(c,0,0)}
  const eyes=await li(`${bp}/eyes.png`);
  if(eyes){tint(ctx,eyes,...(pal?.eyes?.[app.eye_color]||[100,100,100]))}
  const line=await li(`${bp}/lineart.png`);
  if(line)ctx.drawImage(line,0,0);
  if(app.collar_color){const col=await li(`${bp}/collar.png`);if(col){tint(ctx,col,...(pal?.collar?.[app.collar_color]||[200,50,50]))}}
  return cv;
}

let showAllPosesFlag=false;

async function regen(){
  const g=document.getElementById('g'),st=document.getElementById('status');
  g.innerHTML='';st.textContent='Composing...';let ok=0;

  for(const{n,id}of[{n:'🐱 Cats',id:'cat'},{n:'🐕 Dogs',id:'dog'},{n:'🐹 Hamsters',id:'hamster'}]){
    const sec=document.createElement('div');sec.className='section';
    sec.innerHTML=`<div class="stitle">${n}</div>`;
    const grid=document.createElement('div');grid.className='grid';

    for(let i=0;i<8;i++){
      const pid=`pet_${id}_${Date.now()}_${i}_${Math.random().toString(36).slice(2,6)}`;
      const app=genApp(pid,id);
      const item=document.createElement('div');item.className='item';

      const cv=await compose(id,app,'sit');
      cv.style.width=S*Z+'px';cv.style.height=S*Z+'px';
      item.appendChild(cv);ok++;

      const lbl=document.createElement('div');lbl.className='lbl';
      lbl.textContent=`${app.body_color} ${app.pattern||''}`;item.appendChild(lbl);

      const tr=[];
      if(app.ears)tr.push(app.ears);if(app.tail)tr.push(app.tail);
      if(app.cheeks)tr.push(app.cheeks);if(app.eye_color)tr.push(app.eye_color+' eyes');
      if(app.collar_color)tr.push(app.collar_color+' collar');
      const td=document.createElement('div');td.className='traits';td.textContent=tr.join(' · ');item.appendChild(td);

      if(showAllPosesFlag){
        const pr=document.createElement('div');pr.className='poses-row';
        for(const pose of allPoses){
          const w=document.createElement('div');w.className='pose-wrap';
          const pcv=await compose(id,app,pose);w.appendChild(pcv);
          const pl=document.createElement('div');pl.className='pose-label';pl.textContent=pose;
          w.appendChild(pl);pr.appendChild(w);
        }
        item.appendChild(pr);
      }
      grid.appendChild(item);
    }
    sec.appendChild(grid);g.appendChild(sec);
  }
  st.textContent=`${ok} pets composed from PNG layers. 🎲 to regenerate.`;
}
regen();
</script>
</body>
</html>
