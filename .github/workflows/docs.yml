name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'mkdocs-docs/**'
      - 'mkdocs.yml'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mkdocs-docs/**'
      - 'mkdocs.yml'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install mkdocs-material mkdocs-static-i18n

      - name: Build docs
        run: mkdocs build --site-dir _site/docs

      - name: Copy landing page and SEO files
        run: |
          cp docs/index.html _site/
          cp docs/index-full.html _site/
          cp docs/robots.txt _site/
          cp docs/llms.txt _site/
          cp -r docs/img _site/img 2>/dev/null || true
          cp -r img _site/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
