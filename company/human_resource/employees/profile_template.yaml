# 员工档案

name: "{name}"
nickname: "{nickname}"
employee_number: "{employee_number}"
level: {level}
title: "{title}"
department: "{department}"
role: "{role}"
desk_position: [{desk_x}, {desk_y}]
sprite: "{sprite}"

# LLM 配置
llm_model: "{llm_model}"
temperature: {temperature}

# 薪酬 (美元/1M tokens)
salary_per_1m_tokens: {salary_per_1m_tokens}

# 绩效记录
current_quarter_tasks: {current_quarter_tasks}
performance_history:
{performance_history}

# skills 列表 — 每项对应 skills/ 目录下的同名文件
skills:
{skills}

# 权限列表 — 控制员工对工具和资源的访问权
# company_file_access: 公司项目文件读写
# web_search: 网络搜索
# backend_code_maintenance: 后端代码维护（可访问 src/ 目录）
permissions:
{permissions}
