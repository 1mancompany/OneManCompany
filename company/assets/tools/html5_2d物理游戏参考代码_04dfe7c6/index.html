<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Angry Birds Clone</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #87CEEB; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; font-family: Arial, sans-serif; font-size: 24px; color: white; text-shadow: 2px 2px 4px #000; z-index: 10;}
        #level-info { position: absolute; top: 10px; right: 10px; font-family: Arial, sans-serif; font-size: 24px; color: white; text-shadow: 2px 2px 4px #000; z-index: 10;}
        #message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: Arial, sans-serif; font-size: 48px; color: yellow; text-shadow: 2px 2px 4px #000; display: none; text-align: center; z-index: 20;}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    <div id="level-info">Level: <span id="level">1</span></div>
    <div id="message">
        <div id="msg-text">Level Complete!</div>
        <br>
        <button onclick="nextLevel()" style="font-size: 24px; padding: 10px 20px; cursor: pointer;">Next Level</button>
    </div>
    <script>
        // Assets designed by 00009
        const ASSETS = {
            bird: 'bird.png',
            wood_full: 'wood_full.png',
            wood_half: 'wood_half.png',
            wood_broken: 'wood_broken.png',
            background: 'background.png'
        };

        // Matter.js module aliases
        var Engine = Matter.Engine,
            Render = Matter.Render,
            Runner = Matter.Runner,
            Bodies = Matter.Bodies,
            Composite = Matter.Composite,
            Constraint = Matter.Constraint,
            Mouse = Matter.Mouse,
            MouseConstraint = Matter.MouseConstraint,
            Events = Matter.Events,
            Vector = Matter.Vector;

        var engine, render, runner, mouse, mouseConstraint;
        var bird, slingshot;
        var blocks = [];
        var ground;
        var score = 0;
        var currentLevel = 1;
        var isBirdFired = false;

        const levels = [
            // Level 1: Simple structure
            [
                {x: 600, y: 500, w: 50, h: 100},
                {x: 700, y: 500, w: 50, h: 100},
                {x: 650, y: 440, w: 150, h: 20}
            ],
            // Level 2: Taller structure
            [
                {x: 600, y: 500, w: 50, h: 100},
                {x: 700, y: 500, w: 50, h: 100},
                {x: 650, y: 440, w: 150, h: 20},
                {x: 620, y: 380, w: 50, h: 100},
                {x: 680, y: 380, w: 50, h: 100},
                {x: 650, y: 320, w: 150, h: 20}
            ],
            // Level 3: Complex structure
            [
                {x: 550, y: 500, w: 50, h: 100},
                {x: 650, y: 500, w: 50, h: 100},
                {x: 750, y: 500, w: 50, h: 100},
                {x: 600, y: 440, w: 150, h: 20},
                {x: 700, y: 440, w: 150, h: 20},
                {x: 600, y: 380, w: 50, h: 100},
                {x: 700, y: 380, w: 50, h: 100},
                {x: 650, y: 320, w: 150, h: 20}
            ]
        ];

        function init() {
            engine = Engine.create();
            
            render = Render.create({
                element: document.body,
                engine: engine,
                options: {
                    width: window.innerWidth,
                    height: window.innerHeight,
                    wireframes: false,
                    background: '#87CEEB'
                }
            });

            // Try to set background image if exists
            var bgImg = new Image();
            bgImg.src = ASSETS.background;
            bgImg.onload = function() {
                render.options.background = 'url(' + ASSETS.background + ')';
            };

            // Create ground
            ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight - 20, window.innerWidth, 40, { isStatic: true, render: { fillStyle: '#228B22' } });
            Composite.add(engine.world, ground);

            // Mouse control
            mouse = Mouse.create(render.canvas);
            mouseConstraint = MouseConstraint.create(engine, {
                mouse: mouse,
                constraint: {
                    stiffness: 0.2,
                    render: { visible: false }
                }
            });
            Composite.add(engine.world, mouseConstraint);
            render.mouse = mouse;

            Events.on(mouseConstraint, 'enddrag', function(event) {
                if (event.body === bird) {
                    isBirdFired = true;
                    setTimeout(() => {
                        slingshot.bodyB = null;
                    }, 50);
                }
            });

            Events.on(engine, 'collisionStart', handleCollisions);

            Render.run(render);
            runner = Runner.create();
            Runner.run(runner, engine);

            loadLevel(currentLevel);
        }

        function loadLevel(levelNum) {
            // Clear existing bodies except ground and mouse
            var bodiesToRemove = Composite.allBodies(engine.world).filter(b => b !== ground);
            Composite.remove(engine.world, bodiesToRemove);
            if (slingshot) Composite.remove(engine.world, slingshot);

            isBirdFired = false;
            blocks = [];

            // Add bird
            bird = Bodies.circle(200, window.innerHeight - 200, 20, { 
                restitution: 0.5,
                render: {
                    fillStyle: 'red',
                    sprite: { texture: ASSETS.bird, xScale: 0.8, yScale: 0.8 }
                }
            });

            // Add slingshot
            slingshot = Constraint.create({
                pointA: { x: 200, y: window.innerHeight - 200 },
                bodyB: bird,
                stiffness: 0.05,
                render: { strokeStyle: '#4a2311', lineWidth: 5 }
            });

            Composite.add(engine.world, [bird, slingshot]);

            // Add blocks for level
            let levelData = levels[(levelNum - 1) % levels.length];
            levelData.forEach(b => {
                let block = Bodies.rectangle(b.x, window.innerHeight - (window.innerHeight - b.y), b.w, b.h, {
                    render: {
                        fillStyle: '#8B4513',
                        sprite: { texture: ASSETS.wood_full, xScale: b.w/100, yScale: b.h/100 }
                    }
                });
                block.durability = 3; 
                block.maxDurability = 3;
                blocks.push(block);
                Composite.add(engine.world, block);
            });

            document.getElementById('level').innerText = levelNum;
            document.getElementById('message').style.display = 'none';
        }

        function handleCollisions(event) {
            var pairs = event.pairs;
            for (var i = 0; i < pairs.length; i++) {
                var bodyA = pairs[i].bodyA;
                var bodyB = pairs[i].bodyB;

                var relativeVelocity = Vector.sub(bodyA.velocity, bodyB.velocity);
                var speed = Vector.magnitude(relativeVelocity);

                if (speed > 2) {
                    damageBlock(bodyA, speed);
                    damageBlock(bodyB, speed);
                }
            }
        }

        function damageBlock(body, speed) {
            if (body.durability !== undefined) {
                let damage = speed > 5 ? 2 : 1;
                body.durability -= damage;

                if (body.durability <= 0) {
                    Composite.remove(engine.world, body);
                    blocks = blocks.filter(b => b !== body);
                    score += 100;
                    document.getElementById('score').innerText = score;
                    checkLevelComplete();
                } else {
                    if (body.durability == 2) {
                        body.render.sprite.texture = ASSETS.wood_half;
                        body.render.fillStyle = '#A0522D';
                    } else if (body.durability == 1) {
                        body.render.sprite.texture = ASSETS.wood_broken;
                        body.render.fillStyle = '#CD853F';
                    }
                    score += 10;
                    document.getElementById('score').innerText = score;
                }
            }
        }

        function checkLevelComplete() {
            if (blocks.length === 0) {
                document.getElementById('message').style.display = 'block';
            }
        }

        function nextLevel() {
            currentLevel++;
            loadLevel(currentLevel);
        }

        // Reset bird if it goes out of bounds and level not complete
        setInterval(() => {
            if (isBirdFired && bird) {
                if (bird.position.x > window.innerWidth || bird.position.x < 0 || bird.position.y > window.innerHeight) {
                    if (blocks.length > 0) {
                        setTimeout(() => {
                            if(blocks.length === 0) return;
                            Composite.remove(engine.world, bird);
                            bird = Bodies.circle(200, window.innerHeight - 200, 20, { 
                                restitution: 0.5,
                                render: {
                                    fillStyle: 'red',
                                    sprite: { texture: ASSETS.bird, xScale: 0.8, yScale: 0.8 }
                                }
                            });
                            slingshot.bodyB = bird;
                            Composite.add(engine.world, bird);
                            isBirdFired = false;
                        }, 1000);
                        isBirdFired = false; 
                    }
                }
            }
        }, 1000);

        window.onload = init;
    </script>
</body>
</html>
