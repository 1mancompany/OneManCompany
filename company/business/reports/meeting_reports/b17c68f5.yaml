  priority: high
  source: COO(Alex)
- &id003
  description: 为HR开通/提供候选人生成与筛选的工具入口或替代流程（如统一ATS入口、候选人库/简历收集表单），并确认可用的API/工具清单（例如
    list_open_positions()/generate_candidate() 或等价实现）。
  priority: high
  source: COO(Alex)
- &id004
  description: 建立招聘里程碑并写入项目记录：D1产出画像+JD；D3确定渠道并发布；D5收到首批简历并固化筛选标准；D7安排首轮面试；每个里程碑明确负责人、截止时间、验收物。
  priority: high
  source: HR(Sam/00002)
- &id005
  description: 制定并落地招聘流程SLA与升级机制：简历反馈≤48小时、面试结论≤24小时；若关键节点逾期或无记录，在项目记录标记风险并同步CEO/相关负责人，给出补救清单与新截止时间。
  priority: high
  source: COO(Alex)
- &id006
  description: 建立面试排期与会议资源统一规则：会议室/线上会议链接统一预约方式与命名规范，输出可视化看板（面试日历+会议室占用），避免多轮面试资源冲突与空转。
  priority: high
  source: COO(Alex)
- &id007
  description: 引入或统一轻量ATS（或最小可行台账）用于候选人状态流转与面试官反馈模板；至少包含字段：候选人阶段、面试时间、责任人、阻塞点、结论与反馈链接。
  priority: high
  source: COO(Alex)
- &id008
  description: 建立渠道与投放节奏并执行：明确内推/招聘网站/社媒/猎头等渠道占比与发布时间表；同步输出候选人沟通模板（邀约、拒绝、补充信息、offer沟通）。
  priority: medium
  source: HR(Sam/00002)
- &id009
  description: 每次关键动作在项目记录更新数据与状态：投递量、有效简历数、筛选通过数、推进到面试人数、各轮通过率、offer数/接受率；用于驱动渠道与筛选标准迭代。
  priority: high
  source: HR(Sam/00002)
- &id010
  description: 针对“设备仅1件”的供给约束制定扩容方案：确认新工程师入职所需设备规格/数量/到货周期，提交采购或调拨计划并写入项目记录（含预算与交付日期）。
  priority: high
  source: COO(Alex)
- &id011
  description: 在首轮面试前完成面试官对齐：明确面试官名单与分工（技术/协作/工程化）、评分表与反馈提交规范（模板/截止时间），降低评估口径不一致风险。
  priority: medium
  source: HR(Sam/00002)
- &id012
  description: 每周更新一次运营侧可追踪台账到项目记录并用于对CEO汇报：本周面试场次、排期利用率、SLA达成率、阻塞点与解决动作，确保贡献可核实、问题可定位。
  priority: medium
  source: COO(Alex)
