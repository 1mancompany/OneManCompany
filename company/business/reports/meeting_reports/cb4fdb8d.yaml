  priority: high
  source: COO
- description: 评估并落地跨部门日程协调工具（如统一日历权限、自动候选人约面、会议室预订规则、提醒与跟进）：输出工具选型对比与实施计划，优先解决CEO/面试官/候选人多方排期效率问题。
  priority: medium
  source: COO
- description: 梳理并量化资源利用率：建立设备与会议室使用记录口径（预订率/空置率/冲突率），基于“4人-5会议室”结构提出调整方案（合并/共享/对外租用或改造用途）并提交建议。
  priority: medium
  source: COO
- description: 建立EA介入招聘的RACI与任务路由：明确EA在“终面排期、沟通模板、提醒追踪、资料归档、会议纪要”中的职责边界与交付物，避免出现无执行记录/边缘化。
  priority: medium
  source: HR
- description: 建立跨部门任务追踪与汇报机制（看板/周会/行动项清单）：所有招聘关键动作必须有负责人、截止时间、状态与输出链接，确保指令下达后可拆解、分发、追踪、复盘。
  priority: medium
  source: COO
- description: 完成本阶段验收包：将“招聘计划文档、流程评估表、候选人完整列表与评估、风险清单、下一阶段计划（终面-录用-入职）”汇总为单一目录结构并发送验收通知给CEO/COO。
  priority: medium
  source: HR
