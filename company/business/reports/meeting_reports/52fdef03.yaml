  priority: high
  source: COO
- &id005
  description: 补齐并结构化招聘交付物清单与验收标准（JD/岗位画像、面试流程、题库/作业、评分表、offer模板、入职清单），修复当前记录中“面试题库/作…”描述截断问题
  priority: high
  source: HR
- &id006
  description: 制定候选人获取策略与渠道计划（内推、猎头、招聘平台、社群等），并设定首批候选人到达时间目标（例如T+7天产出首批合格候选人列表）
  priority: high
  source: HR
- &id007
  description: 定义面试评估标准与权重（技术、交付能力、自驱沟通、协作），并与面试官统一口径，确保“能独立交付的全栈/后端优先”等优先级落地
  priority: high
  source: COO
- &id008
  description: 完成面试流程排期机制：面试官日历锁定、会议室预留规则、候选人沟通模板；并在看板中记录每位候选人的下一步安排与截止日期
  priority: high
  source: HR
- &id009
  description: 建立资源利用/排期基础记录（4名员工、设备、5间会议室）：至少对“面试占用会议室与面试官时间”做可追踪登记，用于后续计算利用率与冲突预警
  priority: medium
  source: COO
- &id010
  description: 设定招聘节奏里程碑并周度复盘（如：T+3天JD定稿、T+7天首批候选人、T+14天完成首轮面试），在项目记录“实际行动记录”持续更新
  priority: high
  source: HR
- &id011
  description: 入职落地准备流程优化：提前确认账号/权限、设备发放、试用期目标、导师/对接人，形成《入职准备清单》并指定负责人
  priority: medium
  source: COO
- &id012
  description: 为项目记录建立最低可追溯标准：每个关键动作必须记录“分类依据-拆解-分派-时间节点-产出链接-验收状态”，避免仅出现“EA task
