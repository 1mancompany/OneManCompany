action_items: &id001
- description: 对当前候选人（技术研发部 / Engineer / Lv.1 / 花名“极客”）给出明确审批结论（录用/拒绝/待补充信息），并在项目记录中更新状态与结论时间戳，作为本期招聘里程碑验收依据。
  priority: high
  source: COO
- description: 补齐本次招聘全流程可追溯日志：岗位需求确认记录、简历来源与筛选标准、评估要点、面试安排（时间/参与人/会议室）、面试反馈、录用建议、offer沟通记录；全部按时间戳写入统一项目台账。
  priority: high
  source: HR
- description: 牵头建立并发布跨部门招聘协作SOP与RACI（需求确认、面试轮次与决策人、反馈时限、offer审批链路、入职准备），并落地到统一运营台账（包含会议室占用与设备/账号开通）。
  priority: high
  source: COO
- description: 将“拟定入职信息”落到可执行闭环：明确下一步动作（面试轮次/用人经理确认/薪酬区间建议/目标入职日期/入职材料清单）及责任人，并在项目记录中同步更新为可验收的待办清单。
  priority: high
  source: HR
- description: 建立招聘关键里程碑推进机制：设定到面率目标、面试反馈时限（如24-48小时）、offer审批时长上限、阻塞升级路径；每周更新项目状态与风险提示。
  priority: high
  source: COO
- description: 评估并制定新增研发入职的设备保障计划：盘点现有设备（仅1件）可用性与配置，确认新增设备数量/预算/采购周期，形成采购或调拨方案并写入运营台账。
  priority: high
  source: COO
- description: 补齐运营侧实际动作记录：你在本次招聘中协调过的节点（面试排期、会议室协调、预算确认、入职流程、设备与权限准备）统一登记到项目记录，确保贡献可追溯、可复盘。
  priority: medium
  source: COO
- description: 对岗位画像进行标准化沉淀（OMC型工程人才要求、必备/加分技能、沙盒独立编码与调试能力验证方式），形成JD与面试评分表模板并纳入招聘工作流。
  priority: medium
  source: HR
- description: 把会议室与设备使用纳入运营台账：至少记录面试/评审等占用情况（时间段、用途、参与人），以便后续计算利用率与资源瓶颈判断。
  priority: medium
  source: COO
- description: 若当前候选人未通过或超时未确认：启动备选候选人补位计划（补充候选人池、并行推进2-3名），并设置候选人保温机制（定期沟通、预计决策时间同步）以降低流失风险。
  priority: medium
  source: HR
- description: 制定入职后30天培养/融入计划（开发环境/沙盒任务、导师安排、试用期目标与验收标准），并在确认录用后同步到入职清单与项目记录。
  priority: low
  source: HR
