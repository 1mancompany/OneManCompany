action_items: &id001
- description: 在24小时内补齐项目记录“时间点-动作-产出”留痕：招聘主负责人信息（HR-00002）、当前进度说明，并上传/链接可核实产出（岗位画像v0.1、JD
    v0.1、招聘计划大纲）。
  priority: high
  source: HR
- description: 向CEO/业务方发起岗位画像关键信息确认并在记录中形成“决策人+结论+依据”：技术栈与必备/加分项、岗位级别、到岗时间、薪酬区间、面试参与人及决策人（通过一次30分钟对齐会或书面确认）。
  priority: high
  source: HR
- description: 输出岗位画像（ICP）与胜任力模型：优先全栈型代码工程师（OMC：可独立交付、强自驱、文档与自测能力），并明确不符合项（红线）与评估维度。
  priority: high
  source: HR
- description: 在T+2天内完成并发布JD可执行版本（含职责、硬技能/软技能、加分项、工作方式、面试流程概览、薪酬区间范围/谈判空间），并在项目记录中附链接/版本号。
  priority: high
  source: HR
- description: 在T+5天内完成面试流程与题库/评分表：各轮面试目标、题目与评分rubric、通过/淘汰阈值、面试官分工与反馈SLA（如24小时内提交评分）。
  priority: high
  source: HR
- description: 建立并启用轻量候选人跟踪表（类ATS）：字段含渠道、阶段、负责人、下一步动作、日期、评估结果、薪资预期；确保与项目行动记录可追溯关联。
  priority: high
  source: HR
- description: 制定并落地渠道投放/寻访计划（含预算建议与预期漏斗指标）：明确每个渠道的目标候选数、投放节奏、简历筛选标准与响应时限。
  priority: high
  source: HR
- description: 输出薪酬区间与Offer建议包：基准薪资、弹性范围、试用期/期权（如适用）、Offer审批路径与所需材料清单，并在记录中标明决策人。
  priority: high
  source: HR
- description: 建立招聘里程碑与周报节奏并写入项目记录：每周固定更新候选人数、各阶段转化、卡点与风险、下周计划；同时维护“风险-措施-责任人-截止时间”。
  priority: high
  source: HR
- description: 补齐“任务拆解与指派”的可追溯行动记录模板并强制执行：分派对象（含员工编号）、分派时间、交付物清单、验收标准、截止日期、周报频率；并将历史本项目分派内容回填到【实际行动记录】。
  priority: high
  source: COO
- description: 建立分派后的跟进机制并写入项目记录：48小时检查HR是否产出岗位画像/JD初稿；1周内检查题库/评分表与投放计划是否落地；每次检查形成结论与下一步动作。
  priority: high
  source: COO
- description: 明确并行子任务边界与依赖并在项目记录固化：HR招聘主线（画像/JD/渠道/面试/Offer/周报） vs 运营/入职准备支撑（设备、账号权限、流程模板、入职清单）。
  priority: high
  source: COO
- description: 针对设备仅1件的资源风险制定并执行采购/调配计划：确认工程师入职所需设备规格与数量、采购审批与到货时间表、临时备用方案（借用/租赁/云开发环境）。
  priority: high
  source: COO
- description: 建立工程师入职准备清单（与HR对齐时间）：账号与权限、开发环境、仓库权限、文档与规范、办公位与设备交付验收；确保到岗当天可开始交付。
  priority: medium
  source: COO
- description: 推动统一项目记录/行动记录工具流程优化：确保每次分派、反馈、交付物链接自动或半自动同步到行动记录，降低“有结论无留痕”的复盘风险。
  priority: medium
  source: COO
