- &id001
  description: 向CEO/用人负责人发起岗位关键信息补齐并在项目记录留痕（技术栈、级别、远程/坐班、薪资范围、到岗时间、面试轮次、用人优先级），并记录确认人/确认时间；接单后24小时内完成。
  priority: high
  source: HR
- &id002
  description: 基于确认后的岗位画像输出可验收交付物并版本化留痕：至少提交JD（中/英任选其一）+筛选标准+面试流程/评分表（含维度与权重）+作业题（如需要）；每次更新写明版本号与变更点并附链接/附件。
  priority: high
  source: HR
- &id003
  description: 建立招聘推进节奏与可追踪看板：明确渠道投放计划（渠道清单、预算/免费、投放时间、负责人）+每周更新候选人漏斗数据（投递/筛选/面试/offer/入职）到项目记录。
  priority: high
  source: HR
- &id004
  description: 统一岗位优先级与目标画像：本轮优先锁定“符合OMC、可独立交付”的全栈/后端工程师，形成一页式画像摘要并同步给COO/EA用于对齐沟通口径。
  priority: high
  source: HR
- &id005
  description: 补全“任务分析与分派”过程记录：在项目记录写明派单对象（Sam HR）、派单时间、关键决策依据（为何HR主责/运营支持）、下一步里程碑与截止时间，避免“完成但不可追溯”。
  priority: high
  source: COO
- &id006
  description: 为“EA task completed”补充产出物链接/摘要：任务拆解清单、责任人RACI、交付标准与验收口径（如JD/流程/看板的验收标准），确保后续可复盘与可验收。
  priority: high
  source: COO
- &id007
  description: 落地统一的派单/行动日志工具与模板并强制使用：字段包含派单时间、负责人、交付物、状态、版本、链接、阻塞项、下次检查点；并在项目中建立固定更新节奏（例如每周一次）。
  priority: high
  source: COO
- &id008
  description: 进行面试资源（设备/会议室）容量与分配检查：确认现有1件设备的占用规则、是否需要增购/借用或制定共享排期；同时建立面试会议室/设备预定流程，避免后续面试高峰资源瓶颈。
  priority: medium
  source: COO
- &id009
  description: 建立项目风险台账并跟踪：将“招聘推进不可追踪”“设备可能瓶颈”等风险录入，定义触发阈值（如JD未在T+2天产出、漏斗连续两周为0）与升级路径（升级至CEO/COO）。
  priority: medium
  source: COO
- &id010
  description: 规范自评与项目记录对齐机制：要求EA/相关人自评必须引用已留痕事实（链接/记录ID），并在周会前完成核对，避免自评与记录不一致。
  priority: low
  source: COO
