<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimized Angry Birds</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #87CEEB; font-family: sans-serif; }
        #score-board { position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold; color: white; text-shadow: 2px 2px 4px #000; z-index: 10; }
        #instructions { position: absolute; top: 20px; right: 20px; font-size: 16px; color: white; text-shadow: 1px 1px 2px #000; z-index: 10; text-align: right; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
    <div id="score-board">Score: <span id="score">0</span></div>
    <div id="instructions">Drag the bird and release!<br>Press 'R' to reset bird</div>
    <script>
        var Engine = Matter.Engine,
            Render = Matter.Render,
            Runner = Matter.Runner,
            Bodies = Matter.Bodies,
            Composite = Matter.Composite,
            Constraint = Matter.Constraint,
            Mouse = Matter.Mouse,
            MouseConstraint = Matter.MouseConstraint,
            Events = Matter.Events,
            Vector = Matter.Vector;

        var engine = Engine.create(),
            world = engine.world;

        var render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: '#87CEEB'
            }
        });

        Render.run(render);
        var runner = Runner.create();
        Runner.run(runner, engine);

        var score = 0;
        var scoreElement = document.getElementById('score');
        
        function updateScore(points) {
            score += Math.round(points);
            scoreElement.innerText = score;
        }

        var ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight - 25, window.innerWidth, 50, { 
            isStatic: true,
            render: { fillStyle: '#228B22' }
        });

        var slingBase = Bodies.rectangle(250, window.innerHeight - 100, 20, 100, {
            isStatic: true,
            render: { fillStyle: '#8B4513' }
        });

        var birdOptions = { 
            density: 0.008, 
            frictionAir: 0.01, 
            restitution: 0.4,
            label: 'bird',
            render: { fillStyle: '#FF0000' }
        };
        var bird = Bodies.circle(250, window.innerHeight - 170, 20, birdOptions);

        var anchor = { x: 250, y: window.innerHeight - 150 };
        var elastic = Constraint.create({
            pointA: anchor,
            bodyB: bird,
            stiffness: 0.05,
            render: { strokeStyle: '#301A04', lineWidth: 5 }
        });

        function createObstacle(x, y, width, height, type) {
            var options = {
                label: 'obstacle',
                friction: 0.1,     // Lower friction so it's easier to push
                restitution: 0.2,
                density: type === 'wood' ? 0.001 : 0.0005, // Lower density
                render: {
                    fillStyle: type === 'wood' ? '#D2B48C' : '#E0FFFF',
                    strokeStyle: '#000',
                    lineWidth: 1
                }
            };
            var body = Bodies.rectangle(x, y, width, height, options);
            body.customType = type;
            body.maxHealth = type === 'wood' ? 100 : 50;
            body.health = body.maxHealth;
            return body;
        }

        var structure = [];
        var startX = window.innerWidth - 300;
        var startY = window.innerHeight - 50;

        structure.push(createObstacle(startX - 60, startY - 40, 20, 80, 'wood'));
        structure.push(createObstacle(startX + 60, startY - 40, 20, 80, 'wood'));
        structure.push(createObstacle(startX, startY - 90, 160, 20, 'wood'));

        structure.push(createObstacle(startX - 40, startY - 140, 20, 80, 'ice'));
        structure.push(createObstacle(startX + 40, startY - 140, 20, 80, 'ice'));
        structure.push(createObstacle(startX, startY - 190, 120, 20, 'wood'));

        var pig = Bodies.circle(startX, startY - 220, 25, {
            label: 'pig',
            density: 0.001,
            friction: 0.1,
            restitution: 0.2,
            render: { fillStyle: '#32CD32' },
        });
        pig.health = 30;
        pig.maxHealth = 30;

        Composite.add(world, [ground, slingBase, bird, elastic, pig].concat(structure));

        var mouse = Mouse.create(render.canvas),
            mouseConstraint = MouseConstraint.create(engine, {
                mouse: mouse,
                constraint: {
                    stiffness: 0.2,
                    render: { visible: false }
                }
            });

        Composite.add(world, mouseConstraint);
        render.mouse = mouse;

        var isFiring = false;
        Events.on(mouseConstraint, 'enddrag', function(e) {
            if (e.body === bird) {
                isFiring = true;
            }
        });

        Events.on(engine, 'afterUpdate', function() {
            if (isFiring && Math.abs(bird.position.x - anchor.x) < 20 && Math.abs(bird.position.y - anchor.y) < 20) {
                elastic.bodyB = null;
                isFiring = false;
            }
        });

        window.addEventListener('keydown', function(e) {
            if (e.key === 'r' || e.key === 'R') {
                Matter.Body.setPosition(bird, { x: 250, y: window.innerHeight - 170 });
                Matter.Body.setVelocity(bird, { x: 0, y: 0 });
                Matter.Body.setAngularVelocity(bird, 0);
                elastic.bodyB = bird;
                isFiring = false;
            }
        });

        // Track speeds before collision to calculate impact
        var bodySpeeds = {};
        Events.on(engine, 'beforeUpdate', function() {
            var bodies = Composite.allBodies(world);
            for (var i = 0; i < bodies.length; i++) {
                bodySpeeds[bodies[i].id] = bodies[i].speed;
            }
        });

        Events.on(engine, 'collisionStart', function(event) {
            var pairs = event.pairs;
            for (var i = 0; i < pairs.length; i++) {
                var pair = pairs[i];
                var bodyA = pair.bodyA;
                var bodyB = pair.bodyB;
                
                var speedA = bodySpeeds[bodyA.id] || 0;
                var speedB = bodySpeeds[bodyB.id] || 0;
                var impact = speedA + speedB; // Simple approximation of impact force
                
                if (impact > 3) {
                    var damage = impact * 3;
                    applyDamage(bodyA, damage);
                    applyDamage(bodyB, damage);
                }
            }
        });

        function applyDamage(body, damage) {
            if (body.health !== undefined && !body.isStatic) {
                body.health -= damage;
                
                if (body.health <= 0 && body.label !== 'destroyed') {
                    body.label = 'destroyed';
                    Composite.remove(world, body);
                    if (body.render && body.render.fillStyle === '#32CD32') updateScore(500); 
                    else if (body.customType === 'wood') updateScore(100);
                    else if (body.customType === 'ice') updateScore(50);
                } else if (body.health > 0) {
                    var ratio = body.health / body.maxHealth;
                    body.render.opacity = 0.5 + 0.5 * ratio;
                }
            }
        }

        Events.on(render, 'afterRender', function() {
            var ctx = render.context;

            if (bird && bird.render.visible !== false) {
                var pos = bird.position;
                var angle = bird.angle;

                ctx.translate(pos.x, pos.y);
                ctx.rotate(angle);

                ctx.fillStyle = '#FFF';
                ctx.beginPath();
                ctx.arc(8, -5, 4, 0, 2 * Math.PI);
                ctx.arc(8, 5, 4, 0, 2 * Math.PI);
                ctx.fill();

                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(10, -5, 1.5, 0, 2 * Math.PI);
                ctx.arc(10, 5, 1.5, 0, 2 * Math.PI);
                ctx.fill();

                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.moveTo(15, 0);
                ctx.lineTo(25, -4);
                ctx.lineTo(25, 4);
                ctx.fill();
                
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(4, -8);
                ctx.lineTo(10, -10);
                ctx.moveTo(4, 8);
                ctx.lineTo(10, 10);
                ctx.stroke();

                ctx.rotate(-angle);
                ctx.translate(-pos.x, -pos.y);
            }
            
            var allBodies = Composite.allBodies(world);
            for (var i = 0; i < allBodies.length; i++) {
                var body = allBodies[i];
                if (body.label === 'pig' || (body.render && body.render.fillStyle === '#32CD32' && body.health !== undefined && body.label !== 'destroyed')) {
                    var pos = body.position;
                    var angle = body.angle;

                    ctx.translate(pos.x, pos.y);
                    ctx.rotate(angle);

                    ctx.fillStyle = '#228B22';
                    ctx.beginPath();
                    ctx.ellipse(5, 0, 6, 10, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    ctx.fillStyle = '#FFF';
                    ctx.beginPath();
                    ctx.arc(-2, -8, 3, 0, 2 * Math.PI);
                    ctx.arc(-2, 8, 3, 0, 2 * Math.PI);
                    ctx.fill();
                    
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(-1, -8, 1, 0, 2 * Math.PI);
                    ctx.arc(-1, 8, 1, 0, 2 * Math.PI);
                    ctx.fill();

                    ctx.rotate(-angle);
                    ctx.translate(-pos.x, -pos.y);
                } else if ((body.customType === 'wood' || body.customType === 'ice') && body.health < body.maxHealth) {
                    var ratio = body.health / body.maxHealth;
                    var pos = body.position;
                    var angle = body.angle;
                    
                    ctx.translate(pos.x, pos.y);
                    ctx.rotate(angle);
                    
                    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                    ctx.lineWidth = 1 + (1 - ratio) * 2;
                    ctx.beginPath();
                    
                    var w = body.bounds.max.x - body.bounds.min.x;
                    var h = body.bounds.max.y - body.bounds.min.y;
                    
                    ctx.moveTo(-w/4, -h/4);
                    ctx.lineTo(w/4, h/4);
                    ctx.moveTo(w/4, -h/4);
                    ctx.lineTo(-w/4, h/4);
                    
                    ctx.stroke();
                    
                    ctx.rotate(-angle);
                    ctx.translate(-pos.x, -pos.y);
                }
            }
        });

        window.addEventListener('resize', function() {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
            Matter.Body.setPosition(ground, { x: window.innerWidth / 2, y: window.innerHeight - 25 });
        });
    </script>
</body>
</html>
