  result: "I have reviewed the Game Design Document (GDD) for the recently developed\
    \ game, **Soul Rift**, and extracted its core mechanics.\n\n**Summary of Core\
    \ Mechanics for 《Soul Rift》:**\nIt is a fast-paced, anime-style PvE co-op Roguelike\
    \ ARPG (1-4 players) for Roblox. It blends the fast action of *Hades* with the\
    \ loot-driven progression of *Dungeon Quest*, with runs lasting 15-20 minutes.\n\
    \n1. **Run Loop (In-Game Progression):**\n   - Players enter a procedurally generated\
    \ \"Soul Rift\".\n   - **Core Loop:** Clear a room → Choose 1 of 3 random **Talent\
    \ Cards** (to build your run's playstyle/build) → Choose the next room type (Combat,\
    \ Elite, Shop, Rest, etc.).\n   - Face a multi-phase Boss at the end of each floor\
    \ (8-12 rooms).\n\n2. **Meta Progression (Out-of-Game):**\n   - Players earn XP,\
    \ Loot (Gear), and Soul Shards (currency) during runs.\n   - These are used to\
    \ permanently unlock new classes (e.g., Blade Dancer, Soul Caster), upgrade passive\
    \ skill trees, and upgrade/synthesize gear.\n\n3. **Class & Combat System:**\n\
    \   - Multiple classes with distinct roles (melee, ranged, tank).\n   - Each class\
    \ has 3 active skills, 1 ultimate (charge-based), and 1 passive.\n   - Combat\
    \ is optimized for mobile (virtual joystick, 3 skill buttons + dodge, auto-attack\
    \ toggle).\n\n4. **Talent Card System (Build Creation):**\n   - Cards come in\
    \ 4 rarities (Common to Legendary). Higher rarities can drastically change skill\
    \ behaviors.\n   - **Synergy:** Holding specific card combinations triggers powerful\
    \ hidden effects (e.g., Lifesteal + Chain Lightning makes the lightning heal you).\n\
    \n5. **Procedural Generation & Difficulty:**\n   - Dungeons are built by randomly\
    \ stitching together prefab room layouts (corridors, arenas, multi-platform).\n\
    \   - Scaling difficulty tiers (Normal to Endless) introduce hard modifiers like\
    \ \"No Rest Rooms\" or \"Permadeath within the run\".\n\nI have compiled a detailed\
    \ report (`game_mechanics_report.md`) and saved it to the project workspace. I\
    \ have also submitted a direct report to the CEO outlining these findings. \n\n\
    *(Verification: The report was successfully generated from the project's `gdd.md`\
    \ and saved to the workspace.)*"
