acceptance_criteria:
- 提供一套美化后的《愤怒的小鸟》游戏UI方案（含主界面/关卡开始/游戏中HUD/结算页至少4个界面），并保存到项目workspace（含PNG/JPG预览图或Figma导出图）
- 游戏中新增“分数”展示：HUD包含分数字段（当前分数/最高分或关卡分），并在结算页展示得分明细（至少：总分、命中/破坏加分、剩余小鸟加分等）
- 小鸟视觉形象更“有鸟样”：至少提供3个小鸟状态资源（正常/发射中/受击或胜利），风格统一且可用于游戏内
- 交付物包含UI规范：颜色、字体、按钮/卡片样式、图标风格说明（可在README或DesignSpec文档中）
- 提供自检证据：在workspace给出预览图+说明文档，说明各界面元素与分数逻辑展示位置已覆盖验收点
