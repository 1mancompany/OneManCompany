<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>愤怒的小鸟 - Angry Birds Clone</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #87CEEB; 
            font-family: 'Arial', sans-serif;
        }
        canvas { 
            display: block; 
        }
        #ui { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            font-size: 24px; 
            color: white; 
            text-shadow: 2px 2px 4px #000; 
            z-index: 10;
        }
        #level-info { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            font-size: 24px; 
            color: white; 
            text-shadow: 2px 2px 4px #000; 
            z-index: 10;
        }
        #birds-left {
            position: absolute; 
            top: 50px; 
            left: 10px; 
            font-size: 20px; 
            color: yellow; 
            text-shadow: 2px 2px 4px #000; 
            z-index: 10;
        }
        #message { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 48px; 
            color: yellow; 
            text-shadow: 2px 2px 4px #000; 
            display: none; 
            text-align: center; 
            z-index: 20;
            background: rgba(0,0,0,0.5);
            padding: 30px;
            border-radius: 20px;
        }
        #message button {
            font-size: 24px; 
            padding: 15px 30px; 
            margin: 10px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            transition: background 0.3s;
        }
        #message button:hover {
            background: #45a049;
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: white;
            text-shadow: 2px 2px 4px #000;
            z-index: 10;
            text-align: center;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
    <div id="ui">得分: <span id="score">0</span></div>
    <div id="level-info">关卡: <span id="level">1</span></div>
    <div id="birds-left">剩余小鸟: <span id="birds-count">3</span></div>
    <div id="instructions">拖动小鸟发射 | 消灭所有绿猪获胜</div>
    <div id="message">
        <div id="msg-text">关卡完成!</div>
        <div id="msg-subtext" style="font-size: 24px; margin-top: 10px;"></div>
        <br>
        <button onclick="nextLevel()">下一关</button>
        <button onclick="resetLevel()" style="background: #f44336;">重试</button>
    </div>
    <div id="game-over" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; color: red; text-shadow: 2px 2px 4px #000; text-align: center; z-index: 20; background: rgba(0,0,0,0.7); padding: 30px; border-radius: 20px;">
        <div>游戏结束!</div>
        <div style="font-size: 24px; color: white; margin-top: 10px;">得分: <span id="final-score">0</span></div>
        <br>
        <button onclick="restartGame()" style="font-size: 24px; padding: 15px 30px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 10px;">重新开始</button>
    </div>
    <script>
        // Matter.js 模块别名
        const Engine = Matter.Engine,
              Render = Matter.Render,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Composite = Matter.Composite,
              Constraint = Matter.Constraint,
              Mouse = Matter.Mouse,
              MouseConstraint = Matter.MouseConstraint,
              Events = Matter.Events,
              Vector = Matter.Vector,
              Body = Matter.Body;

        // 游戏状态
        let engine, render, runner, mouse, mouseConstraint;
        let bird, slingshot;
        let blocks = [];
        let pigs = [];
        let ground;
        let score = 0;
        let currentLevel = 1;
        let isBirdFired = false;
        let birdsRemaining = 3;
        let gameActive = true;

        // 关卡设计 - 包含方块和猪的位置
        const levels = [
            // 关卡 1: 简单结构
            {
                blocks: [
                    {x: 600, y: 500, w: 20, h: 100},
                    {x: 700, y: 500, w: 20, h: 100},
                    {x: 650, y: 440, w: 140, h: 20}
                ],
                pigs: [
                    {x: 650, y: 400}
                ]
            },
            // 关卡 2: 更高结构
            {
                blocks: [
                    {x: 600, y: 500, w: 20, h: 100},
                    {x: 700, y: 500, w: 20, h: 100},
                    {x: 650, y: 440, w: 140, h: 20},
                    {x: 620, y: 380, w: 20, h: 100},
                    {x: 680, y: 380, w: 20, h: 100},
                    {x: 650, y: 320, w: 140, h: 20}
                ],
                pigs: [
                    {x: 650, y: 280},
                    {x: 650, y: 400}
                ]
            },
            // 关卡 3: 复杂结构
            {
                blocks: [
                    {x: 550, y: 500, w: 20, h: 100},
                    {x: 650, y: 500, w: 20, h: 100},
                    {x: 750, y: 500, w: 20, h: 100},
                    {x: 600, y: 440, w: 140, h: 20},
                    {x: 700, y: 440, w: 140, h: 20},
                    {x: 600, y: 380, w: 20, h: 100},
                    {x: 700, y: 380, w: 20, h: 100},
                    {x: 650, y: 320, w: 140, h: 20}
                ],
                pigs: [
                    {x: 600, y: 400},
                    {x: 700, y: 400},
                    {x: 650, y: 280}
                ]
            },
            // 关卡 4: 金字塔结构
            {
                blocks: [
                    {x: 600, y: 500, w: 20, h: 100},
                    {x: 700, y: 500, w: 20, h: 100},
                    {x: 800, y: 500, w: 20, h: 100},
                    {x: 650, y: 440, w: 140, h: 20},
                    {x: 750, y: 440, w: 140, h: 20},
                    {x: 700, y: 380, w: 20, h: 100},
                    {x: 700, y: 320, w: 140, h: 20}
                ],
                pigs: [
                    {x: 650, y: 400},
                    {x: 750, y: 400},
                    {x: 700, y: 280}
                ]
            }
        ];

        // 初始化游戏
        function init() {
            engine = Engine.create();
            engine.world.gravity.y = 1; // 设置重力
            
            render = Render.create({
                element: document.body,
                engine: engine,
                options: {
                    width: window.innerWidth,
                    height: window.innerHeight,
                    wireframes: false,
                    background: '#87CEEB',
                    showAngleIndicator: false
                }
            });

            // 创建地面
            ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight - 25, window.innerWidth, 50, { 
                isStatic: true, 
                render: { fillStyle: '#228B22' },
                friction: 0.8
            });
            Composite.add(engine.world, ground);

            // 鼠标控制
            mouse = Mouse.create(render.canvas);
            mouseConstraint = MouseConstraint.create(engine, {
                mouse: mouse,
                constraint: {
                    stiffness: 0.2,
                    render: { visible: false }
                }
            });
            Composite.add(engine.world, mouseConstraint);
            render.mouse = mouse;

            // 发射事件
            Events.on(mouseConstraint, 'enddrag', function(event) {
                if (event.body === bird && !isBirdFired) {
                    isBirdFired = true;
                    setTimeout(() => {
                        slingshot.bodyB = null;
                    }, 100);
                }
            });

            // 碰撞检测
            Events.on(engine, 'collisionStart', handleCollisions);

            // 渲染循环 - 添加轨迹效果
            Events.on(render, 'afterRender', function() {
                const ctx = render.context;
                
                // 绘制弹弓
                if (slingshot && bird) {
                    ctx.beginPath();
                    ctx.moveTo(slingshot.pointA.x, slingshot.pointA.y);
                    ctx.lineTo(bird.position.x, bird.position.y);
                    ctx.strokeStyle = '#4a2311';
                    ctx.lineWidth = 5;
                    ctx.stroke();
                }
                
                // 绘制猪的视觉效果
                pigs.forEach(pig => {
                    if (pig && !pig.isRemoved) {
                        ctx.save();
                        ctx.translate(pig.position.x, pig.position.y);
                        ctx.rotate(pig.angle);
                        
                        // 猪的身体（绿色圆形）
                        ctx.beginPath();
                        ctx.arc(0, 0, 20, 0, Math.PI * 2);
                        ctx.fillStyle = '#90EE90';
                        ctx.fill();
                        ctx.strokeStyle = '#228B22';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        
                        // 猪的眼睛
                        ctx.fillStyle = 'white';
                        ctx.beginPath();
                        ctx.arc(-6, -6, 5, 0, Math.PI * 2);
                        ctx.arc(6, -6, 5, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.fillStyle = 'black';
                        ctx.beginPath();
                        ctx.arc(-6, -6, 2, 0, Math.PI * 2);
                        ctx.arc(6, -6, 2, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // 猪的鼻子
                        ctx.fillStyle = '#228B22';
                        ctx.beginPath();
                        ctx.ellipse(0, 4, 8, 5, 0, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // 鼻孔
                        ctx.fillStyle = '#1a6b1a';
                        ctx.beginPath();
                        ctx.arc(-3, 4, 2, 0, Math.PI * 2);
                        ctx.arc(3, 4, 2, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.restore();
                    }
                });
            });

            Render.run(render);
            runner = Runner.create();
            Runner.run(runner, engine);

            loadLevel(currentLevel);
            
            // 开始游戏循环
            setInterval(gameLoop, 100);
        }

        // 加载关卡
        function loadLevel(levelNum) {
            if (levelNum > levels.length) {
                showVictory();
                return;
            }

            // 清除现有物体
            const bodiesToRemove = Composite.allBodies(engine.world).filter(b => b !== ground);
            Composite.remove(engine.world, bodiesToRemove);
            if (slingshot) Composite.remove(engine.world, slingshot);

            isBirdFired = false;
            blocks = [];
            pigs = [];
            birdsRemaining = 3;
            gameActive = true;

            updateUI();

            const levelData = levels[(levelNum - 1) % levels.length];

            // 添加方块
            levelData.blocks.forEach(b => {
                const block = Bodies.rectangle(b.x, b.y, b.w, b.h, {
                    render: { fillStyle: '#8B4513' },
                    density: 0.002,
                    friction: 0.5
                });
                block.durability = 2;
                block.maxDurability = 2;
                block.type = 'block';
                blocks.push(block);
                Composite.add(engine.world, block);
            });

            // 添加猪
            levelData.pigs.forEach(p => {
                const pig = Bodies.circle(p.x, p.y, 20, {
                    render: { fillStyle: '#90EE90', visible: false }, // 隐藏默认渲染，使用自定义
                    density: 0.001,
                    friction: 0.3,
                    restitution: 0.3
                });
                pig.type = 'pig';
                pig.durability = 1;
                pig.isRemoved = false;
                pigs.push(pig);
                Composite.add(engine.world, pig);
            });

            // 创建小鸟
            createBird();

            document.getElementById('level').innerText = levelNum;
            hideMessages();
        }

        // 创建新的小鸟
        function createBird() {
            if (birdsRemaining <= 0) {
                checkGameOver();
                return;
            }

            bird = Bodies.circle(200, window.innerHeight - 250, 15, { 
                restitution: 0.6,
                friction: 0.5,
                density: 0.004,
                render: { fillStyle: '#FF4444' }
            });
            bird.type = 'bird';

            // 创建弹弓约束
            slingshot = Constraint.create({
                pointA: { x: 200, y: window.innerHeight - 250 },
                bodyB: bird,
                stiffness: 0.05,
                damping: 0.01,
                length: 0,
                render: { strokeStyle: '#4a2311', lineWidth: 5 }
            });

            Composite.add(engine.world, [bird, slingshot]);
            isBirdFired = false;
        }

        // 处理碰撞
        function handleCollisions(event) {
            const pairs = event.pairs;
            
            pairs.forEach(pair => {
                const bodyA = pair.bodyA;
                const bodyB = pair.bodyB;

                const speed = Vector.magnitude(Vector.sub(bodyA.velocity, bodyB.velocity));

                if (speed > 1) {
                    applyDamage(bodyA, speed);
                    applyDamage(bodyB, speed);
                }
            });
        }

        // 应用伤害
        function applyDamage(body, speed) {
            if (body.type === 'block') {
                const damage = speed > 5 ? 2 : 1;
                body.durability -= damage;

                if (body.durability <= 0) {
                    Composite.remove(engine.world, body);
                    blocks = blocks.filter(b => b !== body);
                    score += 50;
                    createParticles(body.position.x, body.position.y, '#8B4513', 10);
                } else {
                    score += 5;
                    // 改变颜色表示受损
                    body.render.fillStyle = '#CD853F';
                }
                updateUI();
            } else if (body.type === 'pig' && !body.isRemoved) {
                if (speed > 2) {
                    body.isRemoved = true;
                    Composite.remove(engine.world, body);
                    pigs = pigs.filter(p => p !== body);
                    score += 500;
                    createParticles(body.position.x, body.position.y, '#90EE90', 15);
                    updateUI();
                    checkLevelComplete();
                }
            }
        }

        // 创建粒子效果
        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const particle = Bodies.circle(x + (Math.random() - 0.5) * 20, y + (Math.random() - 0.5) * 20, 3, {
                    render: { fillStyle: color },
                    frictionAir: 0.05
                });
                Body.setVelocity(particle, {
                    x: (Math.random() - 0.5) * 10,
                    y: (Math.random() - 0.5) * 10 - 5
                });
                Composite.add(engine.world, particle);
                
                // 1秒后移除粒子
                setTimeout(() => {
                    Composite.remove(engine.world, particle);
                }, 1000);
            }
        }

        // 检查关卡完成
        function checkLevelComplete() {
            if (pigs.length === 0) {
                gameActive = false;
                setTimeout(() => {
                    document.getElementById('msg-text').innerText = '关卡完成!';
                    document.getElementById('msg-subtext').innerText = `得分: ${score}`;
                    document.getElementById('message').style.display = 'block';
                }, 1000);
            }
        }

        // 检查游戏结束
        function checkGameOver() {
            if (birdsRemaining <= 0 && pigs.length > 0) {
                gameActive = false;
                document.getElementById('final-score').innerText = score;
                document.getElementById('game-over').style.display = 'block';
            }
        }

        // 显示胜利
        function showVictory() {
            gameActive = false;
            document.getElementById('msg-text').innerText = '恭喜通关!';
            document.getElementById('msg-subtext').innerText = `最终得分: ${score}`;
            document.getElementById('message').style.display = 'block';
            document.querySelector('#message button').style.display = 'none';
        }

        // 游戏循环
        function gameLoop() {
            if (!gameActive) return;

            // 检查小鸟是否飞出边界
            if (isBirdFired && bird) {
                if (bird.position.x > window.innerWidth + 100 || 
                    bird.position.x < -100 || 
                    bird.position.y > window.innerHeight + 100) {
                    
                    birdsRemaining--;
                    updateUI();
                    
                    Composite.remove(engine.world, bird);
                    
                    if (pigs.length > 0 && birdsRemaining > 0) {
                        setTimeout(createBird, 500);
                    } else if (birdsRemaining <= 0) {
                        setTimeout(checkGameOver, 1000);
                    }
                }
            }

            // 检查停止运动的小鸟
            if (isBirdFired && bird && birdsRemaining > 0) {
                const speed = Vector.magnitude(bird.velocity);
                if (speed < 0.1 && bird.position.y > window.innerHeight - 100) {
                    birdsRemaining--;
                    updateUI();
                    
                    Composite.remove(engine.world, bird);
                    
                    if (pigs.length > 0 && birdsRemaining > 0) {
                        setTimeout(createBird, 500);
                    } else if (birdsRemaining <= 0) {
                        setTimeout(checkGameOver, 1000);
                    }
                }
            }
        }

        // 更新UI
        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('birds-count').innerText = birdsRemaining;
        }

        // 隐藏消息
        function hideMessages() {
            document.getElementById('message').style.display = 'none';
            document.getElementById('game-over').style.display = 'none';
        }

        // 下一关
        function nextLevel() {
            currentLevel++;
            loadLevel(currentLevel);
        }

        // 重置关卡
        function resetLevel() {
            score = Math.max(0, score - 100); // 惩罚
            loadLevel(currentLevel);
        }

        // 重新开始游戏
        function restartGame() {
            score = 0;
            currentLevel = 1;
            loadLevel(currentLevel);
        }

        // 窗口大小调整
        window.addEventListener('resize', function() {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
            Body.setPosition(ground, { x: window.innerWidth/2, y: window.innerHeight - 25 });
        });

        // 启动游戏
        window.onload = init;
    </script>
</body>
</html>
