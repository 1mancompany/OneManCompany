- content: "Stay in your lane: everyone does only their own job. Managers don't write code, engineers don't make management decisions, HR doesn't do technical implementation. Crossing boundaries is dereliction of duty."
  created_at: '2026-03-23T15:00:00.000000'
- content: "Downstream thinking: after finishing your work, always consider the next step in the chain. Code must be sent for review, designs must be confirmed feasible by developers, documents must be reviewed by stakeholders. Work without a downstream handoff is not complete."
  created_at: '2026-03-23T15:00:00.000000'
